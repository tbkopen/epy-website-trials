name: Deploy Jekyll site to Pages

on:
  push:
    branches:
      - main
      - feature/hero-redesign
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ==================================================
      # Build the main branch
      # ==================================================
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ".ruby-version"
          bundler-cache: true

      - name: Set up Node for Pagefind
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build main site
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --config _config.yml,_config.gh-pages.yml \
            --destination "${{ runner.temp }}/public"

      - name: Build main Pagefind index
        run: |
          npx --yes pagefind \
            --site "${{ runner.temp }}/public" \
            --output-path "${{ runner.temp }}/public/pagefind"

      # ==================================================
      # Build the feature/hero-redesign branch
      # ==================================================
      - name: Checkout hero redesign branch
        uses: actions/checkout@v4
        with:
          ref: feature/hero-redesign
          path: preview-src

      - name: Install preview dependencies
        working-directory: preview-src
        run: bundle install

      - name: Build preview site
        working-directory: preview-src
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --config _config.yml,_config.gh-pages.yml \
            --baseurl "/epy-website-trials/preview" \
            --destination "${{ runner.temp }}/public/preview"

      - name: Build preview Pagefind index
        run: |
          npx --yes pagefind \
            --site "${{ runner.temp }}/public/preview" \
            --output-path "${{ runner.temp }}/public/preview/pagefind"

      # ==================================================
      # Upload and deploy both versions together
      # ==================================================
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
