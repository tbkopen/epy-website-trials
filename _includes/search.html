<div class="search-modal" id="search-modal" role="dialog" aria-modal="true" aria-label="Search" hidden>
  <div class="search-modal__backdrop" id="search-backdrop"></div>
  <div class="search-modal__panel">
    <div class="search-modal__header">
      <span class="material-symbols-outlined search-modal__icon">search</span>
      <div id="search-container"></div>

        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="search-modal__results" id="search-results"></div>
  </div>
</div>
